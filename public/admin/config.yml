backend:
  name: github
  repo: henryandpartners/living-archive-web
  branch: main
  auth_scope: repo

publish_mode: editorial_workflow
media_folder: "public/uploads"
public_folder: "/uploads"
site_url: https://living-archive-web.vercel.app
display_url: https://living-archive-web.vercel.app

collections:
  - name: "chapters"
    label: "Chapters"
    label_singular: "Chapter"
    description: "Edit the 9 story chapters"
    folder: "content/chapters"
    create: false
    extension: "md"
    slug: "{{number}}"
    format: "frontmatter"
    fields:
      - { label: "Chapter Number", name: "number", widget: "number", value_type: "int", min: 1, max: 9 }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Short Label (for TOC)", name: "short", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "YouTube URL", name: "video_url", widget: "string", required: false }

  - name: "settings"
    label: "Settings"
    folder: "content"
    create: false
    slug: "{{slug}}"
    files:
      - label: "Story Page"
        name: "home"
        file: "content/home.md"
        fields:
          - { label: "Institution", name: "institution", widget: "string" }
          - { label: "Headline Line 1", name: "headline_1", widget: "string" }
          - { label: "Headline Line 2", name: "headline_2", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Byline", name: "byline", widget: "string" }
      - label: "Pipeline"
        name: "pipeline"
        file: "content/pipeline.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
      - label: "Publications"
        name: "publications"
        file: "content/publications.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
